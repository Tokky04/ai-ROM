<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>FMA UE Coordination - Full Auto & Natural Voice</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f6; color: #333; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .panel { background: white; padding: 20px; border-radius: 8px; width: 500px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        .video-container { position: relative; width: 480px; height: 360px; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
        video { position: absolute; top: 0; left: 0; opacity: 0; }
        .guide-msg { font-size: 1.4em; font-weight: bold; color: #2980b9; margin: 10px 0; }
        .btn { padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1em; color: white; margin: 5px; transition: 0.2s; }
        .btn:hover { opacity: 0.8; }
        .btn-blue { background: #3498db; }
        .btn-green { background: #2ecc71; width: 100%; }
        .btn-red { background: #e74c3c; }
        .hidden { display: none; }
        .score-board { text-align: left; font-size: 1.1em; line-height: 1.6; background: #ecf0f1; padding: 15px; border-radius: 8px; }
        .highlight { color: #e74c3c; font-weight: bold; font-size: 1.4em; }
    </style>
</head>
<body>

    <h2>FMA 上肢協調性 (完全自動・公式準拠)</h2>

    <div id="setup" class="panel">
        <h3>麻痺側を選択してください</h3>
        <p style="font-size:0.9em; color:#666;">※測定は椅子に座った状態で行います。</p>
        <button class="btn btn-blue" onclick="initSide('left')">左手が麻痺</button>
        <button class="btn btn-red" onclick="initSide('right')">右手が麻痺</button>
    </div>

    <div id="measure-ui" class="panel hidden">
        <h3 id="phase-title">非麻痺側の計測</h3>
        <p id="phase-desc" style="color:#666; font-size:0.9em;"></p>
        <div id="guide" class="guide-msg">準備中...</div>
        <div style="font-size: 1.2em; margin: 10px 0;">回数: <span id="count_val" style="font-weight:bold; font-size: 1.5em;">0</span></div>
        <button id="start-btn" class="btn btn-green" onclick="startPhase()">開始 (音声ガイドあり)</button>
    </div>

    <div class="video-container">
        <video id="input_video"></video>
        <canvas id="output_canvas" width="480px" height="360px"></canvas>
    </div>

    <div id="result-ui" class="panel hidden">
        <h3>最終スコア判定 (麻痺側)</h3>
        <div class="score-board" id="final-results"></div>
        <div style="font-size: 1.5em; font-weight: bold; margin-top: 15px;">FMA 協調性合計: <span id="total-score" class="highlight">-</span> / 6点</div>
        <button class="btn btn-blue" style="margin-top:20px; width:100%;" onclick="location.reload()">最初からやり直す</button>
    </div>

<script>
// --- 音声読み上げの初期化（自然な声を事前ロード） ---
if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

function speak(text) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = 1.0;  // 自然なスピード
    u.pitch = 1.0; // 自然な高さ

    const voices = speechSynthesis.getVoices();
    // より自然な日本語音声（Google, MacのKyoko/O-ren等）を優先して探す
    const naturalVoice = voices.find(v => 
        v.name.includes('Google 日本語') || 
        v.name.includes('Kyoko') || 
        v.name.includes('O-ren') ||
        v.name.includes('Nanami') ||
        v.name.includes('Hattori')
    );

    if (naturalVoice) {
        u.voice = naturalVoice;
    }
    speechSynthesis.speak(u);
}

// --- 計測用変数 ---
let affectedSide = null;
let currentPhase = 'sound_prac'; 
let isMeasuring = false;
let count = 0;
let moveState = 0; 
let startTime = 0;
let soundTime = 0, affectedTime = 0;

// Dysmetria (測定障害) 用
let repMinDist = 999;
let repMinPoint = {x:0, y:0};
let affectedTestPoints = []; 

// Tremor (振戦) 用
let prevFinger = null;
let prevSpeed = 0;
let prevAccel = 0;
let wobbleCount = 0; 

const THRESHOLD_TOUCH = 0.08; 
const THRESHOLD_SCATTER = 0.003; 
const NOISE_DEADBAND = 0.005; 

const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');

function initSide(side) {
    affectedSide = side;
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('measure-ui').classList.remove('hidden');
    updatePhaseUI();
}

function updatePhaseUI() {
    const title = document.getElementById('phase-title');
    const desc = document.getElementById('phase-desc');
    const btn = document.getElementById('start-btn');
    document.getElementById('count_val').innerText = "0";
    btn.classList.remove('hidden');
    
    if(currentPhase === 'sound_prac') {
        title.innerText = "【非麻痺側】練習 (1回)";
        desc.innerText = "目は開けたままでOKです。";
    } else if(currentPhase === 'sound_test') {
        title.innerText = "【非麻痺側】本番 (5回)";
        desc.innerText = "目を閉じて、できるだけ速く5回繰り返してください。";
    } else if(currentPhase === 'affected_prac') {
        title.innerText = "【麻痺側】練習 (1回)";
        desc.innerText = "目は開けたままでOKです。";
    } else if(currentPhase === 'affected_test') {
        title.innerText = "【麻痺側】本番 (5回)";
        desc.innerText = "目を閉じて、できるだけ速く5回繰り返してください。";
    }
}

function startPhase() {
    count = 0; moveState = 0; isMeasuring = true;
    repMinDist = 999; repMinPoint = {x:0, y:0};
    prevFinger = null; prevSpeed = 0; prevAccel = 0;
    
    if (currentPhase === 'affected_test') {
        affectedTestPoints = [];
        wobbleCount = 0;
    }

    document.getElementById('start-btn').classList.add('hidden');
    speak(currentPhase.includes('test') ? "目を閉じてください。膝からスタート。" : "練習です。膝からスタート。");
    document.getElementById('guide').innerText = "膝に指を置いて待機";
    startTime = performance.now();
}

function onResults(results) {
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.poseLandmarks && isMeasuring) {
        const landmarks = results.poseLandmarks;
        const nose = landmarks[0];
        const lShoulder = landmarks[11];
        const rShoulder = landmarks[12];
        
        let fingerIdx = currentPhase.includes('sound') 
            ? (affectedSide === 'left' ? 20 : 19) 
            : (affectedSide === 'left' ? 19 : 20);
        const fingerTip = landmarks[fingerIdx];

        const shoulderY = (lShoulder.y + rShoulder.y) / 2;
        const kneeThresholdY = shoulderY + 0.35; 
        const distToNose = Math.sqrt(Math.pow(nose.x - fingerTip.x, 2) + Math.pow(nose.y - fingerTip.y, 2));

        if (moveState === 0 && fingerTip.y < kneeThresholdY - 0.05) {
            moveState = 1;
            repMinDist = 999; 
            document.getElementById('guide').innerText = "鼻へ！";
        } 
        else if (moveState === 1) {
            // --- Tremor (振戦) 解析 ---
            if (currentPhase === 'affected_test' && prevFinger) {
                let dx = fingerTip.x - prevFinger.x;
                let dy = fingerTip.y - prevFinger.y;
                let speed = Math.sqrt(dx*dx + dy*dy);
                let accel = speed - prevSpeed;

                if (Math.abs(accel) > NOISE_DEADBAND) {
                    if ((accel > 0 && prevAccel < 0) || (accel < 0 && prevAccel > 0)) {
                        wobbleCount++;
                    }
                    prevAccel = accel;
                }
                prevSpeed = speed;
            }
            prevFinger = {x: fingerTip.x, y: fingerTip.y};

            // --- Dysmetria (測定障害) 解析 ---
            if (distToNose < repMinDist) {
                repMinDist = distToNose;
                repMinPoint = {x: fingerTip.x, y: fingerTip.y};
            }

            if (fingerTip.y > kneeThresholdY) {
                count++;
                document.getElementById('count_val').innerText = count;
                speak(count.toString());
                
                if (currentPhase === 'affected_test') {
                    affectedTestPoints.push({dist: repMinDist, x: repMinPoint.x, y: repMinPoint.y});
                }

                if (count >= (currentPhase.includes('prac') ? 1 : 5)) {
                    endPhase();
                    return;
                } else {
                    moveState = 0;
                    document.getElementById('guide').innerText = "次、鼻へ！";
                }
            }
        }
    }
    canvasCtx.restore();
}

function endPhase() {
    isMeasuring = false;
    const timeTaken = ((performance.now() - startTime) / 1000).toFixed(1);
    
    if (currentPhase === 'sound_prac') {
        speak("練習おわり。次は本番です。");
        currentPhase = 'sound_test';
    } else if (currentPhase === 'sound_test') {
        soundTime = parseFloat(timeTaken);
        speak(`非麻痺側の計測終了。タイムは${soundTime}秒。次は麻痺側の練習です。`);
        currentPhase = 'affected_prac';
    } else if (currentPhase === 'affected_prac') {
        speak("練習おわり。次は本番です。");
        currentPhase = 'affected_test';
    } else if (currentPhase === 'affected_test') {
        affectedTime = parseFloat(timeTaken);
        speak(`終了です。目を開けてください。お疲れ様でした。`);
        calculateFinalScores();
        return;
    }
    updatePhaseUI();
}

function calculateFinalScores() {
    document.getElementById('measure-ui').classList.add('hidden');
    document.getElementById('result-ui').classList.remove('hidden');

    // 1. スピード計算
    const timeDiff = affectedTime - soundTime;
    let speedScore = (timeDiff < 2.0) ? 2 : ((timeDiff < 6.0) ? 1 : 0);

    // 2. 測定障害 (Dysmetria) 計算
    let dysmetriaScore = 0;
    let touchCount = affectedTestPoints.filter(p => p.dist <= THRESHOLD_TOUCH).length;
    if (touchCount === 5) {
        dysmetriaScore = 2; 
    } else {
        let avgX = affectedTestPoints.reduce((s, p) => s + p.x, 0) / 5;
        let avgY = affectedTestPoints.reduce((s, p) => s + p.y, 0) / 5;
        let variance = affectedTestPoints.reduce((s, p) => s + Math.pow(p.x - avgX, 2) + Math.pow(p.y - avgY, 2), 0) / 5;
        dysmetriaScore = (variance > THRESHOLD_SCATTER) ? 0 : 1;
    }

    // 3. 振戦 (Tremor) 計算
    let tremorScore = 0;
    let avgWobbles = wobbleCount / 5; 
    
    if (avgWobbles < 3.0) tremorScore = 2; 
    else if (avgWobbles < 8.0) tremorScore = 1; 
    else tremorScore = 0; 

    document.getElementById('final-results').innerHTML = `
        <b>⏱ スピード</b>: <b style="color:#2980b9;">${speedScore} 点</b><br>
        <span style="font-size:0.9em; color:#666;">差: ${timeDiff.toFixed(1)}秒</span><hr>
        
        <b>🎯 測定障害</b>: <b style="color:#2980b9;">${dysmetriaScore} 点</b><br>
        <span style="font-size:0.9em; color:#666;">AI判定: ${dysmetriaScore === 2 ? 'ズレなし' : (dysmetriaScore === 1 ? '規則的・軽度' : '不規則・著明')}</span><hr>

        <b>🫨 振戦 (Tremor)</b>: <b style="color:#2980b9;">${tremorScore} 点</b><br>
        <span style="font-size:0.9em; color:#666;">AI判定: 平均 ${avgWobbles.toFixed(1)}回/ストローク</span>
    `;
    
    document.getElementById('total-score').innerText = speedScore + dysmetriaScore + tremorScore;
}

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6});
pose.onResults(onResults);
new Camera(videoElement, {onFrame: async () => {await pose.send({image: videoElement});}, width: 480, height: 360}).start();
</script>
</body>
</html>
